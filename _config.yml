about_content: | # this will include new lines to allow paragraphs
  Benjamin here. Happy for you to visit. Currently a Trade Officer with the Ministry of Trade and Industry. My main portfolio is Saudi Arabia and the Gulf Cooperation Council.
  I like to constantly explore new avenues of knowledge and am willing to take risks to jump into new areas. Currently looking to enter the pentesting/red teaming world. Am also open to exploring OSINT and Threat Intelligence paths given my intelligence background.

  
  Taking pentesting courses from TCM Academy with the aim of taking the PNPT certification by early next year. 
  I have taken courses on python and javascript though it has been sometime since i used both.


  Starting a personal pet project next year where I hope to do deep research into the Japanese Occupation of Singapore with a specific focus on the human experience from both the Japanese soldier and the local citizenry and trying to understand what would drive someone to be an informant and betray their own people

